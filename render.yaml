# render.yaml
# Render.com deployment — single web service using Docker runtime.
# No Redis, no separate worker.
# Jobs run via FastAPI BackgroundTasks (thread pool) within the same process.

services:
  - type: web
    name: newspaper-intel-service
    runtime: docker
    region: singapore
    plan: free

    healthCheckPath: /health

    envVars:
      # ── Supabase ─────────────────────────────────────────────────────────
      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_SERVICE_KEY
        sync: false

      # ── Auth ─────────────────────────────────────────────────────────────
      # Shared secret — must match NEWSPAPER_INTEL_KEY in ROBIN
      - key: SERVICE_SECRET_KEY
        sync: false

      # ── ROBIN Integration ─────────────────────────────────────────────────
      # Fallback client_id when not provided in the request body
      # Get this UUID from your Supabase clients table
      - key: ROBIN_CLIENT_ID
        sync: false

      # Optional: pin a specific source_id for all newspaper articles
      # Leave blank to auto-create a source per newspaper name
      - key: NEWSPAPER_SOURCE_ID
        value: ""

      # ── OCR / PDF settings ────────────────────────────────────────────────
      - key: MAX_PDF_SIZE_MB
        value: "50"

      - key: OCR_CONFIDENCE_THRESHOLD
        value: "0.6"

      # ── Logging ───────────────────────────────────────────────────────────
      - key: LOG_LEVEL
        value: "INFO"

      # Force UTF-8 output — prevents UnicodeEncodeError in container logs
      - key: PYTHONUTF8
        value: "1"

      # ── CORS ──────────────────────────────────────────────────────────────
      # Add your ROBIN frontend domain here
      - key: CORS_ORIGINS
        sync: false

      - key: RENDER_EXTERNAL_URL
        value: "https://newspaper-intel-service.onrender.com"

      - key: ACTIVE_SOURCES
        value: "all"

      # ── Tier-3 login credentials (optional) ──────────────────────────────
      - key: HINDU_EMAIL
        sync: false

      - key: HINDU_PASSWORD
        sync: false
